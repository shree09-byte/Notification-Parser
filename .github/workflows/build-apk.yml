name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: |
          npm run build
          # Capacitor failsafe: ensure dist, dist/applet, and dist/applet/browser all contain the index.html so it never fails
          mkdir -p dist/applet/browser
          cp -r dist/* dist/applet/browser/ 2>/dev/null || true
          cp -r dist/* dist/applet/ 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PulseIntelligence-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
