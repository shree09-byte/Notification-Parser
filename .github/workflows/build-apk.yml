name: Build Android APK

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: |
          npm run build
          # Capacitor failsafe: ensure dist, dist/applet, and dist/applet/browser all contain the index.html so it never fails
          mkdir -p dist/applet/browser
          cp -r dist/* dist/applet/browser/ 2>/dev/null || true
          cp -r dist/* dist/applet/ 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Hotfix Outdated Plugins (Remove jcenter)
        run: |
          # The Google Auth plugin uses the deprecated jcenter() which crashes modern Gradle.
          # We search and replace all instances of jcenter() with mavenCentral() in node_modules.
          grep -rl "jcenter()" node_modules/ | xargs sed -i 's/jcenter()/mavenCentral()/g' || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build APK (System Gradle)
        run: |
          cd android
          # Delete the corrupted capacitor wrapper before it can break anything
          rm -rf gradle/wrapper/
          rm -f gradlew gradlew.bat
          
          # Generate signing report so the user can find their SHA-1 for Firebase
          gradle signingReport > signing-report.txt
          
          # Use Ubuntu's natively installed Gradle engine instead of a wrapper
          gradle assembleDebug

      - name: Upload Signing Report
        uses: actions/upload-artifact@v4
        with:
          name: PulseIntelligence-SigningReport
          path: android/signing-report.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PulseIntelligence-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
